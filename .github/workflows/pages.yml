name: Deploy demo site

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Allow GITHUB_TOKEN to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel a run that is mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # The baked model is a plain git blob, not LFS — Pages would serve an LFS
      # pointer as text and the loader would reject it as a non-TCP1 pack.
      - name: Check the baked pack is a real TCP1 pack
        run: |
          head -c 4 web/models/nanofable-16m-fp16.tpack | grep -q 'TCP1'

      # enablement: turns Pages on (source = Actions) the first time this runs,
      # so the repo needs no manual Settings change.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
